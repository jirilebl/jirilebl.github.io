<div class="para logical">
<div class="para">The second form of the fundamental theorem of calculus still holds if we let <span class="process-math">\(d \in [a,b]\)</span> and define</div>
<div class="displaymath process-math">
\begin{equation}
F(x) \coloneqq \int_d^x f .
\end{equation}
</div>
<div class="para">That is, we can use any point of <span class="process-math">\([a,b]\)</span> as our base point.  The proof is left as an exercise.</div>
