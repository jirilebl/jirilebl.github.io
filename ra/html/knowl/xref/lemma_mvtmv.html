<span class="type">Lemma</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">8.4.1</span><span class="period heading-divison-mark heading-divison-mark__period">.</span>
</h4>
<div class="para logical">
<div class="para">If <span class="process-math">\(\varphi \colon [a,b] \to \R^n\)</span> is differentiable on <span class="process-math">\((a,b)\)</span> and continuous on <span class="process-math">\([a,b]\text{,}\)</span> then there exists a <span class="process-math">\(t_0 \in (a,b)\)</span> such that</div>
<div class="displaymath process-math">
\begin{equation}
\bnorm{\varphi(b)-\varphi(a)} \leq (b-a) \bnorm{\varphi'(t_0)} .
\end{equation}
</div>
