<div class="para logical">
<div class="para">If <span class="process-math">\(\{ x_n \}_{n=1}^\infty\)</span> is a convergent sequence, then every subsequence <span class="process-math">\(\{ x_{n_i} \}_{i=1}^\infty\)</span> is also convergent, and</div>
<div class="displaymath process-math">
\begin{equation}
\lim_{n\to \infty} x_n = 
\lim_{i\to \infty} x_{n_i} .
\end{equation}
</div>
