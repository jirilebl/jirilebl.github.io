<article class="theorem theorem-like"><h4 class="heading">
<span class="type">Theorem</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">4.2.4</span><span class="period heading-divison-mark heading-divison-mark__period">.</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="title">Mean value theorem.</span>
</h4>
<div class="para logical">
<div class="para">Let <span class="process-math">\(f \colon [a,b] \to \R\)</span> be a continuous function differentiable on <span class="process-math">\((a,b)\text{.}\)</span>  Then there exists a point <span class="process-math">\(c \in (a,b)\)</span> such that</div>
<div class="displaymath process-math">
\begin{equation}
f(b)-f(a) = f'(c)(b-a) .
\end{equation}
</div>
