<article class="proposition theorem-like"><h4 class="heading">
<span class="type">Proposition</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">5.1.10</span><span class="period heading-divison-mark heading-divison-mark__period">.</span>
</h4>
<div class="para logical">
<div class="para">Let <span class="process-math">\(f \colon [a,b] \to \R\)</span> be a Riemann integrable function. Let <span class="process-math">\(m, M \in \R\)</span> be such that <span class="process-math">\(m \leq f(x) \leq M\)</span> for all <span class="process-math">\(x \in [a,b]\text{.}\)</span>  Then</div>
<div class="displaymath process-math">
\begin{equation}
m(b-a) \leq
\int_a^b f
\leq M(b-a) .
\end{equation}
</div>
