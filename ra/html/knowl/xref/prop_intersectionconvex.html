<span class="type">Proposition</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">8.1.23</span><span class="period heading-divison-mark heading-divison-mark__period">.</span>
</h4>
<div class="para logical">
<div class="para">The intersection of two convex sets is convex.  In fact, if <span class="process-math">\(\{ C_\lambda \}_{\lambda \in I}\)</span> is an arbitrary collection of convex sets in a vector space, then</div>
<div class="displaymath process-math">
\begin{equation}
C \coloneqq \bigcap_{\lambda \in I} C_\lambda
\qquad \text{is convex.}
\end{equation}
</div>
