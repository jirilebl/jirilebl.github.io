<span class="type">Theorem</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">5.3.1</span><span class="period heading-divison-mark heading-divison-mark__period">.</span>
</h4>
<div class="para logical">
<div class="para">Let <span class="process-math">\(F \colon [a,b] \to \R\)</span> be a continuous function, differentiable on <span class="process-math">\((a,b)\text{.}\)</span>  Let <span class="process-math">\(f \in \sR\bigl([a,b]\bigr)\)</span> be such that <span class="process-math">\(f(x) = F'(x)\)</span> for <span class="process-math">\(x \in
(a,b)\text{.}\)</span>  Then</div>
<div class="displaymath process-math">
\begin{equation}
\int_a^b f = F(b)-F(a) .
\end{equation}
</div>
