<div class="para">A (complex) power series is a series of the form</div>
<div class="displaymath process-math">
\begin{equation}
\sum_{n=0}^\infty c_n {(z-a)}^n
\end{equation}
</div>
<div class="para">for <span class="process-math">\(c_n, z, a \in \C\text{.}\)</span>  We say the series <em class="emphasis">converges</em> if the series converges for some <span class="process-math">\(z \neq a\text{.}\)</span>
</div>
