<div class="para logical">
<div class="para">Let <span class="process-math">\(A\)</span> and <span class="process-math">\(B\)</span> be sets.  The <em class="emphasis">Cartesian product</em> is the set of tuples defined as</div>
<div class="displaymath process-math">
\begin{equation}
A \times B \coloneqq
\bigl\{ (x,y) : x \in A, y \in B \bigr\} .
\end{equation}
</div>
