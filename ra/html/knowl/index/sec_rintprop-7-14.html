<div class="para">A function <span class="process-math">\(f\)</span> is called a <em class="emphasis">step function</em> if it can be written as</div>
<div class="displaymath process-math">
\begin{equation}
f(x) = \sum_{k=1}^n \alpha_k \varphi_{I_k} (x)
\end{equation}
</div>
<div class="para">for some real numbers <span class="process-math">\(\alpha_1,\alpha_2, \ldots, \alpha_n\)</span> and some bounded intervals <span class="process-math">\(I_1,I_2,\ldots,I_n\text{.}\)</span>
