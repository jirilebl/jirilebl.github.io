<div class="para">A series <span class="process-math">\(\sum_{n=1}^\infty x_n\)</span> <em class="emphasis">converges absolutely</em> if the series <span class="process-math">\(\sum_{n=1}^\infty \sabs{x_n}\)</span> converges. If a series converges, but does not converge absolutely, we say it <em class="emphasis">converges conditionally</em>.<div class="autopermalink" data-description="Paragraph"><a href="#sec_series-6-6-1-1" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
