<div class="para">A set <span class="process-math">\(A\)</span> is a <em class="emphasis">subset</em> of a set <span class="process-math">\(B\)</span> if <span class="process-math">\(x \in A\)</span> implies <span class="process-math">\(x \in B\text{,}\)</span> and we write <span class="process-math">\(A \subset B\text{.}\)</span> That is, all members of <span class="process-math">\(A\)</span> are also members of <span class="process-math">\(B\text{.}\)</span>  At times we write <span class="process-math">\(B \supset A\)</span> to mean the same thing.<div class="autopermalink" data-description="Paragraph"><a href="#sec_basicset-4-11-1-2-1-1" title="Copy heading and permalink for Paragraph" aria-label="Copy heading and permalink for Paragraph">🔗</a></div>
