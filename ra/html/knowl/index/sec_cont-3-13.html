<div class="para logical">
<div class="para">Let <span class="process-math">\(f \colon \R \to \R\)</span> be a <em class="emphasis">polynomial</em>.  That is,</div>
<div class="displaymath process-math">
\begin{equation}
f(x) = a_d x^d + a_{d-1} x^{d-1} + \cdots + a_1 x + a_0 ,
\end{equation}
</div>
<div class="para">for some constants <span class="process-math">\(a_0, a_1, \ldots, a_d\text{.}\)</span> Then <span class="process-math">\(f\)</span> is continuous.</div>
