</div>
<div class="displaymath process-math">

\sqrt{xy} \leq \frac{x+y}{2} .
\end{equation}
</div>
<div class="para">Furthermore, equality occurs if and only if <span class="process-math">\(x=y\text{.}\)</span>
</div>
