<div class="para logical">
<div class="para">Consider <span class="process-math">\(f \colon A \to B\)</span> and <span class="process-math">\(g \colon B \to C\text{.}\)</span>  The <em class="emphasis">composition</em> of the functions <span class="process-math">\(f\)</span> and <span class="process-math">\(g\)</span> is the function <span class="process-math">\(g \circ f \colon A \to C\)</span> defined as</div>
<div class="displaymath process-math">
\begin{equation}
(g \circ f)(x) \coloneqq g\bigl(f(x)\bigr) .
\end{equation}
</div>
