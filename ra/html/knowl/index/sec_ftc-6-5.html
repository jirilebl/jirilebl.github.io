<div class="para logical">
<div class="para">Prove <em class="emphasis">integration by parts</em>.  That is, suppose <span class="process-math">\(F\)</span> and <span class="process-math">\(G\)</span> are continuously differentiable functions on <span class="process-math">\([a,b]\text{.}\)</span>  Then prove</div>
<div class="displaymath process-math">
\begin{equation}
\int_a^b F(x)G'(x)\,dx
=
F(b)G(b)-F(a)G(a)
-
\int_a^b F'(x)G(x)\,dx .
\end{equation}
</div>
