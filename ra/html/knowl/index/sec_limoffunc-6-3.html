<span class="type">Definition</span><span class="space heading-divison-mark heading-divison-mark__space"> </span><span class="codenumber">3.1.14</span><span class="period heading-divison-mark heading-divison-mark__period">.</span>
</h4>
<div class="para logical">
<div class="para">Let <span class="process-math">\(f \colon S \to \R\)</span> be a function and <span class="process-math">\(A \subset S\text{.}\)</span>  Define the function <span class="process-math">\(f|_A \colon A \to \R\)</span> by</div>
<div class="displaymath process-math">
\begin{equation}
f|_A (x) \coloneqq f(x)  \qquad \text{for } x \in A.
\end{equation}
</div>
<div class="para">We call <span class="process-math">\(f|_A\)</span> the <em class="emphasis">restriction</em> of <span class="process-math">\(f\)</span> to <span class="process-math">\(A\text{.}\)</span>
</div>
