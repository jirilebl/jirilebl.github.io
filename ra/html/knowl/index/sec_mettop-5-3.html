<div class="para logical">
<div class="para">Let <span class="process-math">\((X,d)\)</span> be a metric space and <span class="process-math">\(A \subset X\text{.}\)</span> The <em class="emphasis">closure</em> of <span class="process-math">\(A\)</span> is the set</div>
<div class="displaymath process-math">
\begin{equation}
\widebar{A} \coloneqq \bigcap \{ E \subset X : E \text{ is closed and } A \subset
E \} .
\end{equation}
