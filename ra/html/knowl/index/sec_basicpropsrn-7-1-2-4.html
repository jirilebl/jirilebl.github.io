<div class="para logical">
<div class="para">Similarly, if there exists a lower bound <span class="process-math">\(b_0\)</span> of <span class="process-math">\(E\)</span> such that <span class="process-math">\(b_0 \geq b\)</span> for all lower bounds <span class="process-math">\(b\)</span> of <span class="process-math">\(E\text{,}\)</span> then <span class="process-math">\(b_0\)</span> is called the <em class="emphasis">greatest lower bound</em> or the <em class="emphasis">infimum</em> of <span class="process-math">\(E\text{.}\)</span>  We write</div>
<div class="displaymath process-math">
\begin{equation}
\inf\, E \coloneqq b_0 .
\end{equation}
</div>
